// 指定使用 proto3 版本
syntax = "proto3";

// 指定包名，避免命名冲突
// 生成的 Python 代码会使用这个包名作为模块路径
package test;

// 定义服务，这是Grpc的核心
service TestLearn{
    // 1，简单 一元 RPC
    rpc Test1(test1_request) returns (test1_response){}

    // 2, 服务端流式 RPC
    rpc server_stream(server_request) returns (stream server_response){}

    // 3, 客户端流式 RPC
    rpc client_stream(stream client_request) returns (client_response){}

    // 4, 双向流式 RPC
    rpc bidirectional_stream(stream bidirectional_request) returns (stream bidirectional_response){}
}


// 1，简单 一元 RPC
message test1_request{
    int32 id = 1;
}
message test1_response{
    string reply = 1;
}


// 2, 服务端流式 RPC
message server_request{ 
    int32 id = 1;  
}
message server_response{ 
    string reply = 1;
}

// 3, 客户端流式 RPC
message client_request{ 
    int32 id = 1;  
}
message client_response{ 
    string reply = 1;
}

// 4, 双向流式 RPC
message bidirectional_request {
    int32 id = 1;  
}
message bidirectional_response {
    string reply = 1;
}